<!DOCTYPE html>
<html lang="zh" dir="ltr">
<head>
<!-- Google tag (gtag.js) -->

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>联系我们 — 传奇叶问</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🥋</text></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;600;700;900&family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<style>
  .contact-wrap { max-width: 600px; margin: 0 auto; padding: calc(var(--header-height) + 40px) 20px 80px; }
  .contact-wrap h1 { font-size: 1.8rem; font-weight: 900; margin-bottom: 8px; text-align: center; }
  .contact-wrap .sub { text-align: center; color: var(--text-secondary); margin-bottom: 32px; }
  .contact-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 32px; }
  .contact-card .form-group { margin-bottom: 16px; }
  .contact-card label { display: block; font-weight: 700; margin-bottom: 6px; font-size: 0.85rem; }
  .contact-card input, .contact-card textarea { width: 100%; padding: 12px 16px; background: var(--bg-primary); border: 1px solid var(--border); border-radius: var(--radius-sm); color: var(--text-primary); font-family: inherit; font-size: 0.95rem; }
  .contact-card textarea { min-height: 120px; resize: vertical; }
  .contact-card input:focus, .contact-card textarea:focus { outline: none; border-color: var(--accent); }
  .contact-card .submit-btn { width: 100%; padding: 14px; background: var(--accent); color: #000; border: none; border-radius: var(--radius-full); font-family: inherit; font-size: 1rem; font-weight: 700; cursor: pointer; margin-top: 8px; }
  .contact-card .submit-btn:hover { background: var(--accent-hover); transform: translateY(-2px); }
</style>
</head>
<body>
<header class="header" id="header">
  <div class="container nav-inner">
    <a href="index.html" class="logo"><span class="logo-icon">🥋</span><span class="logo-text">叶问传奇</span></a>
    <nav style="display:flex;gap:24px">
      <a href="index.html" class="nav-link">首页</a>
      <a href="about.html" class="nav-link">关于</a>
      <a href="contact.html" class="nav-link active">联系</a>
    </nav>
    <div class="nav-actions">
      <button class="theme-btn" id="themeToggle" aria-label="切换主题">
        <span class="theme-icon">🌙</span>
      </button>
    </div>
  </div>
</header>

<div class="contact-wrap">
  <h1>📬 联系我们</h1>
  <p class="sub">有问题或建议？我们期待您的反馈。</p>
  <div class="contact-card">
    <form onsubmit="handleSubmit(event)">
      <div class="form-group">
        <label>您的姓名</label>
        <input type="text" required placeholder="请输入您的姓名">
      </div>
      <div class="form-group">
        <label>电子邮箱</label>
        <input type="email" required placeholder="请输入您的邮箱">
      </div>
      <div class="form-group">
        <label>留言内容</label>
        <textarea required placeholder="请输入您的留言..."></textarea>
      </div>
      <button type="submit" class="submit-btn">📤 发送消息</button>
    </form>
  </div>
</div>

<footer class="footer">
  <div class="container">
    <div class="footer-inner">
      <div class="footer-brand">
        <span class="logo-icon">🥋</span>
        <span>传奇叶问</span>
      </div>
      <nav style="display:flex;gap:20px;font-size:0.85rem">
        <a href="privacy.html" style="color:var(--text-muted)">隐私政策</a>
        <a href="terms.html" style="color:var(--text-muted)">使用条款</a>
        <a href="contact.html" style="color:var(--text-muted)">联系我们</a>
      </nav>
      <p class="footer-copy">© 2026 传奇叶问 — The Legend of Ip Man</p>
    </div>
  </div>
</footer>

<script src="config.js"></script>
<script>
document.addEventListener('DOMContentLoaded', () => {
  const saved = localStorage.getItem('ipman_theme');
  const dark = saved ? saved === 'dark' : window.matchMedia('(prefers-color-scheme: dark)').matches;
  document.documentElement.setAttribute('data-theme', dark ? 'dark' : 'light');
  const icon = document.querySelector('.theme-icon');
  if (icon) icon.textContent = dark ? '🌙' : '☀️';
  document.getElementById('themeToggle').addEventListener('click', () => {
    const next = document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
    document.documentElement.setAttribute('data-theme', next);
    localStorage.setItem('ipman_theme', next);
    if (icon) icon.textContent = next === 'dark' ? '🌙' : '☀️';
  });
});
function handleSubmit(e) {
  e.preventDefault();
  alert('感谢您的留言！我们会尽快回复。');
  e.target.reset();
}
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh" dir="ltr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>管理面板 — 叶问传奇</title>
<meta name="robots" content="noindex, nofollow">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🔐</text></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;600;700;900&family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<style>
  .admin-wrap { max-width: 900px; margin: 0 auto; padding: calc(var(--header-height, 70px) + 24px) 20px 60px; }
  .login-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 40px; max-width: 420px; margin: 80px auto; text-align: center; box-shadow: var(--shadow-lg); }
  .login-card h2 { font-size: 1.4rem; margin-bottom: 8px; }
  .login-card p { color: var(--text-secondary); margin-bottom: 24px; font-size: 0.9rem; }
  .login-card .form-group { margin-bottom: 16px; text-align: left; }
  .login-card .form-group label { display: block; font-weight: 700; margin-bottom: 6px; font-size: 0.85rem; }
  .login-card .form-group input { width: 100%; padding: 12px 16px; background: var(--bg-primary); border: 1px solid var(--border); border-radius: var(--radius-sm); color: var(--text-primary); font-size: 0.95rem; }
  .login-card .form-group input:focus { outline: none; border-color: var(--accent); }
  .login-card .login-btn { width: 100%; padding: 14px; background: var(--accent); color: #000; border: none; border-radius: var(--radius-full); font-size: 1rem; font-weight: 700; cursor: pointer; margin-top: 8px; transition: var(--transition); }
  .login-card .login-btn:hover { background: var(--accent-hover); transform: translateY(-2px); }
  .login-error { color: #e74c3c; font-weight: 600; font-size: 0.85rem; margin-top: 12px; min-height: 20px; }
  .login-back { display: block; margin-top: 20px; color: var(--text-muted); font-size: 0.85rem; }
  .dash-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 24px; flex-wrap: wrap; gap: 12px; }
  .dash-header h1 { font-size: 1.6rem; font-weight: 800; }
  .stats-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 24px; }
  .stat-box { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius-md); padding: 16px; text-align: center; }
  .stat-box .num { font-size: 1.6rem; font-weight: 800; color: var(--accent); display: block; }
  .stat-box .lbl { font-size: 0.75rem; color: var(--text-muted); font-weight: 600; }
  .tabs { display: flex; gap: 4px; margin-bottom: 20px; border-bottom: 2px solid var(--border); }
  .tab { padding: 10px 20px; font-weight: 700; font-size: 0.9rem; color: var(--text-secondary); border: none; background: none; cursor: pointer; border-bottom: 3px solid transparent; margin-bottom: -2px; transition: var(--transition); }
  .tab.active { color: var(--accent); border-bottom-color: var(--accent); }
  .tab:hover { color: var(--accent); }
  .panel { display: none; } .panel.active { display: block; }
  .ch-list { display: flex; flex-direction: column; gap: 10px; }
  .ch-item { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius-md); padding: 16px; }
  .ch-head { display: flex; align-items: center; gap: 12px; }
  .ch-head .icon { font-size: 1.6rem; }
  .ch-head .info { flex: 1; }
  .ch-head .name { font-weight: 700; }
  .ch-head .count { font-size: 0.8rem; color: var(--text-muted); }
  .ch-head .actions { display: flex; gap: 6px; }
  .song-list { margin-top: 10px; padding-left: 16px; }
  .song-row { display: flex; align-items: center; gap: 10px; padding: 8px 12px; background: var(--bg-secondary); border: 1px solid var(--border); border-radius: var(--radius-sm); margin-bottom: 6px; }
  .song-row .title { flex: 1; font-weight: 600; font-size: 0.85rem; }
  .song-row .acts { display: flex; gap: 4px; }
  .form-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 24px; margin-bottom: 20px; }
  .form-card h3 { margin-bottom: 16px; font-size: 1.1rem; }
  .form-card .form-group { margin-bottom: 14px; }
  .form-card .form-group label { display: block; font-weight: 700; margin-bottom: 6px; font-size: 0.85rem; color: var(--text-secondary); }
  .form-card .form-group input, .form-card .form-group select { width: 100%; padding: 10px 14px; background: var(--bg-primary); border: 1px solid var(--border); border-radius: var(--radius-sm); color: var(--text-primary); font-size: 0.9rem; }
  .form-card .form-group input:focus { outline: none; border-color: var(--accent); }
  .btn-icon { width: 32px; height: 32px; border-radius: var(--radius-sm); border: 1px solid var(--border); background: var(--bg-primary); color: var(--text-primary); display: flex; align-items: center; justify-content: center; font-size: 0.8rem; cursor: pointer; transition: var(--transition); }
  .btn-icon:hover { border-color: var(--accent); color: var(--accent); }
  .btn-icon.danger:hover { border-color: #e74c3c; color: #e74c3c; }
  .book-link-card { background: linear-gradient(135deg, var(--accent-soft), rgba(212,168,83,0.05)); border: 1px solid rgba(212,168,83,0.3); }
  .toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%) translateY(100px); background: var(--bg-card); border: 1px solid var(--accent); color: var(--text-primary); padding: 12px 24px; border-radius: var(--radius-full); font-weight: 700; font-size: 0.9rem; z-index: 9999; transition: var(--transition); box-shadow: var(--shadow-lg); }
  .toast.show { transform: translateX(-50%) translateY(0); }
  .upload-progress { margin-top: 8px; }
  .upload-bar { height: 4px; background: var(--border); border-radius: 4px; overflow: hidden; }
  .upload-fill { height: 100%; background: var(--accent); border-radius: 4px; width: 0; transition: width 0.3s; }
  .upload-text { font-size: 0.75rem; color: var(--text-muted); margin-top: 4px; }
</style>
</head>
<body>

<header class="header scrolled" id="header">
  <div class="container nav-inner">
    <a href="index.html" class="logo">
      <span class="logo-icon">🥋</span>
      <span class="logo-text">管理面板</span>
    </a>
    <div class="nav-actions">
      <button class="theme-btn" id="themeToggle" aria-label="切换主题">
        <span class="theme-icon">🌙</span>
      </button>
      <a href="index.html" class="btn btn-primary btn-sm">🏠 首页</a>
    </div>
  </div>
</header>

<div class="admin-wrap">
  <!-- Login -->
  <div id="loginView" class="login-card">
    <div style="font-size:3rem;margin-bottom:16px;">🔐</div>
    <h2>登录</h2>
    <p>叶问传奇管理面板</p>
    <div class="form-group">
      <label>邮箱</label>
      <input type="email" id="loginEmail" placeholder="admin@ipman.com">
    </div>
    <div class="form-group">
      <label>密码</label>
      <input type="password" id="loginPass" placeholder="••••••••">
    </div>
    <button class="login-btn" id="loginBtn" onclick="doLogin()">登录 →</button>
    <div class="login-error" id="loginError"></div>
    <a class="login-back" href="index.html">← 返回首页</a>
  </div>

  <!-- Dashboard -->
  <div id="dashView" style="display:none;">
    <div class="dash-header">
      <h1>📊 管理面板</h1>
      <button class="btn btn-primary btn-sm" onclick="DB.logout(); location.reload()">🚪 退出</button>
    </div>
    <div class="stats-row">
      <div class="stat-box"><span class="num" id="statCh">0</span><span class="lbl">章节</span></div>
      <div class="stat-box"><span class="num" id="statSongs">0</span><span class="lbl">曲目</span></div>
      <div class="stat-box"><span class="num" id="statMusic">0</span><span class="lbl">音乐</span></div>
    </div>
    <div class="tabs">
      <button class="tab active" onclick="switchTab('chapters',this)">📚 章节与曲目</button>
      <button class="tab" onclick="switchTab('add',this)">➕ 添加</button>
      <button class="tab" onclick="switchTab('settings',this)">⚙️ 设置</button>
    </div>

    <!-- Chapters Tab -->
    <div class="panel active" id="panel-chapters">
      <div class="ch-list" id="chList"></div>
    </div>

    <!-- Add Tab -->
    <div class="panel" id="panel-add">
      <div class="form-card">
        <h3>➕ 添加新章节</h3>
        <div class="form-group">
          <label>章节名称</label>
          <input type="text" id="newChName" placeholder="例：第一章 — 叶问的童年">
        </div>
        <div class="form-group">
          <label>图标</label>
          <input type="text" id="newChIcon" placeholder="🎵" value="🎵">
        </div>
        <button class="btn btn-primary" onclick="addChapter()">添加章节</button>
      </div>
      <div class="form-card">
        <h3>🎵 添加曲目</h3>
        <div class="form-group">
          <label>章节</label>
          <select id="songChapter"></select>
        </div>
        <div class="form-group">
          <label>曲目名称</label>
          <input type="text" id="newSongTitle" placeholder="曲目名称">
        </div>
        <div class="form-group">
          <label>音频文件 (MP3)</label>
          <input type="file" id="newSongFile" accept="audio/*">
        </div>
        <div class="form-group">
          <label>封面图片 (PNG/JPG) — 可选</label>
          <input type="file" id="newSongImg" accept="image/*">
        </div>
        <div class="upload-progress" id="uploadProgress" style="display:none">
          <div class="upload-bar"><div class="upload-fill" id="uploadFill"></div></div>
          <div class="upload-text" id="uploadText">上传中...</div>
        </div>
        <button class="btn btn-primary" id="addSongBtn" onclick="addSong()">添加曲目</button>
      </div>
    </div>

    <!-- Settings Tab -->
    <div class="panel" id="panel-settings">
      <div class="form-card book-link-card">
        <h3>🛒 购买链接</h3>
        <p style="color:var(--text-secondary);margin-bottom:16px;font-size:0.9rem;">
          在此处设置书籍购买链接（Amazon、京东等），网站将显示"购买"按钮
        </p>
        <div class="form-group">
          <label>购买链接</label>
          <input type="url" id="buyUrl" placeholder="https://amazon.com/your-book">
        </div>
        <button class="btn btn-primary" onclick="saveBuyUrl()">💾 保存链接</button>
        <div style="margin-top:12px;font-size:0.85rem;color:var(--text-muted);">
          <span id="buyUrlStatus"></span>
        </div>
      </div>
      <div class="form-card">
        <h3>🔑 修改密码</h3>
        <div class="form-group">
          <label>新邮箱</label>
          <input type="email" id="newEmail" placeholder="new@email.com">
        </div>
        <div class="form-group">
          <label>新密码</label>
          <input type="password" id="newPass" placeholder="新密码">
        </div>
        <button class="btn btn-primary" onclick="resetPass()">💾 更新</button>
      </div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="config.js"></script>
<script>
// Theme
(function(){
  const saved = localStorage.getItem('ipman_theme') || 'dark';
  document.documentElement.setAttribute('data-theme', saved);
  const icon = document.querySelector('.theme-icon');
  if (icon) icon.textContent = saved === 'dark' ? '🌙' : '☀️';
  document.getElementById('themeToggle').onclick = () => {
    const next = document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
    document.documentElement.setAttribute('data-theme', next);
    localStorage.setItem('ipman_theme', next);
    if (icon) icon.textContent = next === 'dark' ? '🌙' : '☀️';
  };
})();

async function doLogin() {
  await DB.init();
  const email = document.getElementById('loginEmail').value.trim();
  const pass = document.getElementById('loginPass').value.trim();
  if (DB.login(email, pass)) {
    DB.setSession(email);
    showDashboard();
  } else {
    document.getElementById('loginError').textContent = '❌ 邮箱或密码错误';
  }
}

document.addEventListener('DOMContentLoaded', async () => {
  await DB.init();
  if (DB.isLoggedIn()) showDashboard();
});

function showDashboard() {
  document.getElementById('loginView').style.display = 'none';
  document.getElementById('dashView').style.display = '';
  refreshData();
}

function refreshData() {
  const chapters = DB.getChapters();
  const totalSongs = chapters.reduce((s, c) => s + (c.songs?.length || 0), 0);
  document.getElementById('statCh').textContent = chapters.length;
  document.getElementById('statSongs').textContent = totalSongs;
  document.getElementById('statMusic').textContent = chapters.filter(c => c.id >= 9).reduce((s, c) => s + (c.songs?.length || 0), 0);
  renderChapters();
  populateChapterSelect();
  const buyUrl = localStorage.getItem('ipman_buyurl') || '';
  document.getElementById('buyUrl').value = buyUrl;
  document.getElementById('buyUrlStatus').textContent = buyUrl ? '✅ 已保存' : '❌ 未设置';
}

function renderChapters() {
  const chapters = DB.getChapters();
  document.getElementById('chList').innerHTML = chapters.map(c => `
    <div class="ch-item">
      <div class="ch-head">
        <span class="icon">${c.icon}</span>
        <div class="info"><div class="name">${c.name}</div><div class="count">${(c.songs||[]).length} 首曲目</div></div>
        <div class="actions"><button class="btn-icon danger" onclick="deleteChapter(${c.id})" title="删除">🗑️</button></div>
      </div>
      ${(c.songs||[]).map(s => `
        <div class="song-list">
          <div class="song-row">
            <span>🎵</span>
            <span class="title">${s.title}</span>
            <div class="acts"><button class="btn-icon danger" onclick="deleteSong(${c.id},${s.id})" title="删除">🗑️</button></div>
          </div>
        </div>
      `).join('')}
    </div>
  `).join('');
}

function populateChapterSelect() {
  const chapters = DB.getChapters();
  document.getElementById('songChapter').innerHTML = chapters.map(c => `<option value="${c.id}">${c.icon} ${c.name}</option>`).join('');
}

function switchTab(name, btn) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('panel-' + name).classList.add('active');
}

async function addChapter() {
  const name = document.getElementById('newChName').value.trim();
  const icon = document.getElementById('newChIcon').value.trim() || '🎵';
  if (!name) return showToast('❌ 请输入章节名称');
  DB.addChapter(name, icon);
  document.getElementById('newChName').value = '';
  showToast('✅ 章节已添加');
  refreshData();
}

async function addSong() {
  const chId = parseInt(document.getElementById('songChapter').value);
  const title = document.getElementById('newSongTitle').value.trim();
  const fileInput = document.getElementById('newSongFile');
  const imgInput = document.getElementById('newSongImg');
  if (!title) return showToast('❌ 请输入曲目名称');
  if (!fileInput.files[0]) return showToast('❌ 请选择音频文件');
  const btn = document.getElementById('addSongBtn');
  btn.disabled = true;
  document.getElementById('uploadProgress').style.display = '';
  try {
    document.getElementById('uploadText').textContent = '上传音频中...';
    document.getElementById('uploadFill').style.width = '20%';
    const audio = await DB.uploadFile(fileInput.files[0], 'audio', (p) => { document.getElementById('uploadFill').style.width = p + '%'; });
    let imgUrl = '';
    if (imgInput.files[0]) {
      document.getElementById('uploadText').textContent = '上传图片中...';
      const img = await DB.uploadFile(imgInput.files[0], 'assets');
      imgUrl = img.url;
    }
    DB.addSong(chId, title, audio.url, audio.path, imgUrl);
    showToast('✅ 曲目已添加');
    fileInput.value = ''; imgInput.value = ''; document.getElementById('newSongTitle').value = '';
    refreshData();
  } catch (e) { showToast('❌ 错误: ' + e.message); }
  btn.disabled = false;
  document.getElementById('uploadProgress').style.display = 'none';
}

function deleteChapter(id) {
  if (!confirm('确定删除此章节？')) return;
  DB.deleteChapter(id);
  showToast('✅ 已删除');
  refreshData();
}
function deleteSong(chId, sId) {
  if (!confirm('确定删除此曲目？')) return;
  DB.deleteSong(chId, sId);
  showToast('✅ 已删除');
  refreshData();
}

async function saveBuyUrl() {
  const url = document.getElementById('buyUrl').value.trim();
  localStorage.setItem('ipman_buyurl', url);
  document.getElementById('buyUrlStatus').textContent = url ? '✅ 已保存' : '❌ 已清除';
  showToast(url ? '✅ 购买链接已保存' : '🗑️ 链接已清除');
}

async function resetPass() {
  const email = document.getElementById('newEmail').value.trim();
  const pass = document.getElementById('newPass').value.trim();
  if (!pass) return showToast('❌ 请输入新密码');
  await DB.resetPassword(pass, email);
  showToast('✅ 登录信息已更新');
  document.getElementById('newEmail').value = '';
  document.getElementById('newPass').value = '';
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}
</script>
</body>
</html>

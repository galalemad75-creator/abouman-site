<!DOCTYPE html>
<html lang="zh" dir="ltr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>传奇叶问 — The Legend of Ip Man</title>
<meta name="description" content="传奇叶问 — 音乐与传记">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🥋</text></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;600;700;900&family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<!-- Preloader -->
<div class="preloader" id="preloader">
  <div class="preloader-inner">
    <div class="preloader-ring"></div>
    <span class="preloader-icon">🥋</span>
  </div>
</div>

<!-- Particles -->
<div class="particles" id="particles"></div>

<!-- Header -->
<header class="header" id="header">
  <div class="container nav-inner">
    <a href="#" class="logo" onclick="showHome()">
      <span class="logo-icon">🥋</span>
      <span class="logo-text">叶问传奇</span>
    </a>
    <button class="hamburger" id="hamburger"><span></span><span></span><span></span></button>
    <ul class="nav-links" id="navMenu">
      <li><a href="#hero" class="nav-link active">首页</a></li>
      <li><a href="#chapters" class="nav-link">章节</a></li>
      <li><a href="#about" class="nav-link">关于</a></li>
    </ul>
    <div class="nav-actions">
      <button class="theme-btn" id="themeToggle" aria-label="切换主题">
        <span class="theme-icon">🌙</span>
      </button>
      <a href="admin.html" class="btn btn-primary btn-sm">🔐 管理</a>
    </div>
  </div>
</header>

<!-- HERO -->
<section class="hero" id="hero">
  <div class="hero-bg"></div>
  <div class="hero-glow"></div>
  <div class="hero-content">
    <div class="hero-cover-wrap">
      <div class="cover-glow"></div>
      <img src="assets/book-cover.png" alt="书籍封面" class="hero-cover" id="heroCover" onerror="this.style.display='none'">
      <div class="cover-badge">🔥 NEW</div>
    </div>
    <div class="hero-text">
      <div class="hero-tag">📖 叶问传奇</div>
      <h1 class="hero-title">
        <span class="title-line">传奇</span>
        <span class="title-accent">叶问</span>
      </h1>
      <p class="hero-sub">一部震撼人心的音乐传记 — 8章故事，2段音乐</p>
      <div class="hero-stats">
        <div class="stat-item">
          <span class="stat-num" id="chCount">8</span>
          <span class="stat-label">章节</span>
        </div>
        <div class="stat-divider"></div>
        <div class="stat-item">
          <span class="stat-num" id="epCount">0</span>
          <span class="stat-label">曲目</span>
        </div>
        <div class="stat-divider"></div>
        <div class="stat-item">
          <span class="stat-num">🎹</span>
          <span class="stat-label">音乐</span>
        </div>
      </div>
      <div class="hero-actions">
        <a href="#chapters" class="btn btn-hero">
          <span>🎧 立即收听</span>
        </a>
        <a href="#" id="buyBtnHero" class="btn btn-outline-hero" style="display:none">
          <span>🛒 购买书籍</span>
        </a>
      </div>
    </div>
  </div>
  <div class="hero-scroll">
    <span>向下滚动</span>
    <div class="scroll-arrow">↓</div>
  </div>
</section>

<!-- Chapters -->
<section class="chapters-section" id="chapters">
  <div class="container">
    <div class="section-header">
      <span class="section-tag">🎵</span>
      <h2 class="section-title">所有章节</h2>
      <p class="section-sub">选择一个章节开始收听</p>
    </div>
    <div class="chapters-grid" id="chaptersGrid">
      <div class="skeleton-card"></div>
      <div class="skeleton-card"></div>
      <div class="skeleton-card"></div>
    </div>
  </div>
</section>

<!-- About -->
<section class="about-section" id="about">
  <div class="container">
    <div class="about-grid">
      <div class="about-visual">
        <img src="assets/book-cover.png" alt="书籍" class="about-img" onerror="this.parentElement.innerHTML='<div class=about-placeholder>📖</div>'">
      </div>
      <div class="about-text">
        <span class="section-tag">📖 关于本书</span>
        <h2 class="section-title">传奇叶问</h2>
        <p>一段跨越传奇人物叶问生平的非凡旅程。本书包含8个章节的精彩音乐和2个纯音乐篇章，每一个都诉说着不同的传奇故事。</p>
        <div class="about-features">
          <div class="about-feat"><span class="feat-icon">🎵</span><span>8个音乐章节</span></div>
          <div class="about-feat"><span class="feat-icon">🎹</span><span>2段纯音乐</span></div>
          <div class="about-feat"><span class="feat-icon">📖</span><span>人物传记</span></div>
          <div class="about-feat"><span class="feat-icon">🎧</span><span>高品质音频</span></div>
        </div>
        <a href="#" id="buyBtnAbout" class="btn btn-primary btn-lg" style="display:none">🛒 立即购买</a>
      </div>
    </div>
  </div>
</section>

<!-- Buy CTA -->
<section class="cta-section" id="buySection" style="display:none">
  <div class="container">
    <div class="cta-card">
      <div class="cta-content">
        <h2>📖 购买本书</h2>
        <p>获取您的传奇叶问传记</p>
        <a href="#" id="buyBtnCTA" class="btn btn-hero">🛒 立即购买 →</a>
      </div>
    </div>
  </div>
</section>

<!-- Footer -->
<footer class="footer">
  <div class="container">
    <div class="footer-inner">
      <div class="footer-brand">
        <span class="logo-icon">🥋</span>
        <span>传奇叶问</span>
      </div>
      <p class="footer-copy">© 2026 版权所有</p>
    </div>
  </div>
</footer>

<!-- Now Playing Bar -->
<div class="np-bar" id="npBar">
  <img id="npImg" class="np-cover" style="display:none">
  <div class="np-info">
    <div class="np-title" id="npTitle"></div>
    <div class="np-sub" id="npSub"></div>
    <div class="np-progress-mini" id="npProgress">
      <div class="np-fill" id="npFill"></div>
    </div>
  </div>
  <div class="np-controls">
    <button onclick="prevSong()" class="np-btn" aria-label="上一首">⏮</button>
    <button onclick="togglePlay()" id="playBtn" class="np-btn np-play">▶</button>
    <button onclick="nextSong()" class="np-btn" aria-label="下一首">⏭</button>
    <button onclick="closePlayer()" class="np-btn np-close">✕</button>
  </div>
</div>

<!-- Theme Player (auto-play on interaction) -->
<audio id="themePlayer" loop preload="auto"></audio>
<audio id="player"></audio>

<script src="config.js"></script>
<script src="app.js"></script>
</body>
</html>

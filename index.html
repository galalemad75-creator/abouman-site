<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>الاسطورة اب مان — The Legend Abou Man</title>
<meta name="description" content="السيرة الذاتية للاسطورة اب مان — أغاني وفصول الكتاب">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎵</text></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800;900&family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<header class="header" id="header">
  <div class="container nav-inner">
    <a href="index.html" class="logo">
      <span class="logo-icon">🎵</span>
      <span class="logo-text">اب مان</span>
    </a>
    <button class="hamburger" id="hamburger"><span></span><span></span><span></span></button>
    <ul class="nav-links" id="navMenu">
      <li><a href="index.html" class="nav-link active">الرئيسية</a></li>
      <li><a href="about.html" class="nav-link">عن الكتاب</a></li>
      <li><a href="contact.html" class="nav-link">تواصل</a></li>
    </ul>
    <div class="nav-actions">
      <button id="themeToggle">🌙</button>
      <a href="admin.html" class="btn btn-primary btn-sm">🔐 إدارة</a>
    </div>
  </div>
</header>

<section class="hero" id="hero">
  <div class="hero-content">
    <div class="book-cover" style="margin-bottom:24px">
      <img src="assets/book-cover.png" alt="غلاف الكتاب" style="max-width:200px;border-radius:12px;box-shadow:var(--shadow-lg)" onerror="this.style.display='none'">
    </div>
    <h1>الاسطورة اب مان</h1>
    <p>السيرة الذاتية — أغاني وموسيقى</p>
    <div class="hero-badges">
      <div class="badge">📚 <span class="num" id="chCount">10</span> أبواب</div>
      <div class="badge">🎵 <span class="num" id="epCount">0</span> أغنية</div>
      <div class="badge" id="buyBadge" style="display:none">🛒 <a href="#" id="buyLink" style="color:var(--accent);font-weight:700;text-decoration:none">اشتري الكتاب</a></div>
    </div>
  </div>
</section>

<section class="chapters-section" id="chapters">
  <div class="container">
    <h2 class="section-title">🎵 جميع الأبواب</h2>
    <p class="section-sub">اختر باب للاستماع</p>
    <div class="chapters-grid" id="chaptersGrid">
      <p style="text-align:center;color:var(--text-muted);grid-column:1/-1;padding:40px">جاري التحميل...</p>
    </div>
  </div>
</section>

<section class="cta-section" id="buySection" style="display:none">
  <h2>📖 اشتري الكتاب</h2>
  <p>احصل على نسختك من كتاب الاسطورة اب مان</p>
  <a href="#" id="buyBtn" class="btn btn-primary" target="_blank">🛒 شراء الكتاب →</a>
</section>

<footer class="footer">
  <p>🎵 الاسطورة اب مان</p>
</footer>

<div class="np-bar">
  <img id="npImg" style="display:none">
  <div class="np-info">
    <div class="np-title" id="npTitle"></div>
    <div class="np-sub" id="npSub"></div>
  </div>
  <div class="np-controls">
    <button onclick="prevSong()">⏮</button>
    <button onclick="togglePlay()" id="playBtn">▶</button>
    <button onclick="nextSong()">⏭</button>
    <button onclick="closePlayer()">✕</button>
  </div>
  <div class="np-progress" onclick="seekAudio(event)"><div class="np-fill" id="npFill"></div></div>
</div>

<audio id="player"></audio>

<script src="config.js"></script>
<script src="app.js"></script>
<script>
document.addEventListener('DOMContentLoaded', () => {
  setTimeout(() => {
    const ch = DB.getChapters();
    document.getElementById('chCount').textContent = ch.length;
    document.getElementById('epCount').textContent = ch.reduce((s, c) => s + (c.songs?.length || 0), 0);
    // Show buy link if available
    const buyUrl = localStorage.getItem('ab_buyurl');
    if (buyUrl) {
      document.getElementById('buyBadge').style.display = 'flex';
      document.getElementById('buyLink').href = buyUrl;
      document.getElementById('buyBtn').href = buyUrl;
      document.getElementById('buySection').style.display = 'block';
    }
  }, 500);
});
</script>
</body>
</html>
